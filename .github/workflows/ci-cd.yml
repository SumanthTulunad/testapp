name: CI-CD Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Configure Docker
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Build Docker Image
      run: |
        docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sample-repo/sample-api:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sample-repo/sample-api:${{ github.sha }}

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy sample-api \
          --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sample-repo/sample-api:${{ github.sha }} \
          --region ${{ secrets.GCP_REGION }} \
          --platform managed \
          --allow-unauthenticated














