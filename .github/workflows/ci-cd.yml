name: CI-CD Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # ✅ Authenticate to GCP
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    # ✅ Setup gcloud
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    # ✅ Configure Docker for Artifact Registry
    - name: Configure Docker
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    # ✅ Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sample-repo/sample-api:${{ github.sha }} .

    # ✅ Push Docker Image
    - name: Push Docker Image
      run: |
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sample-repo/sample-api:${{ github.sha }}

    # ✅ Detect Environment (dev / staging / prod)
    - name: Set Environment
      run: |
        if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
          echo "ENV=dev" >> $GITHUB_ENV
        elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
          echo "ENV=staging" >> $GITHUB_ENV
        else
          echo "ENV=prod" >> $GITHUB_ENV
        fi

    # ✅ Optional: Print Environment (for debugging)
    - name: Print Environment
      run: echo "Deploying to $ENV"

    # ✅ Deploy to Cloud Run (Multi-Environment)
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy sample-api-${{ env.ENV }} \
          --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sample-repo/sample-api:${{ github.sha }} \
          --region ${{ secrets.GCP_REGION }} \
          --platform managed \
          --allow-unauthenticated